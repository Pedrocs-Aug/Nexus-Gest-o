<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Gestão | Painel de sites</title>

    <link rel="icon" type="image/png" href="../img/nexus_logo.png">

    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/conferencia.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/sidebar.css">
</head>

<body>
    <header class="cabecalho">
        <h1>NEXUS</h1>
        <p>gestão</p>
    </header>

    <main class="container-principal">
        <nav class="sidebar">
            <a href="../index.html">
                <img src="../img/img-menus/nexus_logo.png" alt="Nexus Logo" class="logo">
            </a>
            <ul class="menu">
                <li><a href="../index.html" class="btn-nav">Início</a></li>
                <li><a href="../html/sobre.html" class="btn-nav">Sobre</a></li>
                <li><a href="#" class="btn-nav">Serviços</a></li>
                <li><a href="../html/contato.html" class="btn-nav">Contato</a></li>
            </ul>
            <footer class="rodape-sidebar">
                <p>&copy; 2026 Nexus Gestão.</p>
                <p>Todos os direitos reservados.</p>
                <p>Desenvolvido por Pedro Augusto</p>
            </footer>
        </nav>

        <section class="dashboard">

            <div class="upload-section">
                <h2>Importar Relatório Excel</h2>
                <div class="filtros-rapidos"
                style="display: flex; gap: 10px; justify-content: center; margin-bottom: 15px;">
                <button id="btn-filtro-u" class="btn-filtro">📦 Ver Pedidos "U"</button>
                <button id="btn-filtro-b" class="btn-filtro">📦 Ver Pedidos "B"</button>
                <button id="btn-filtro-todos" class="btn-filtro btn-todos">🔄 Ver Todos</button>
            </div>
                <p>Selecione um arquivo .csv para formatar a tabela automaticamente.</p>
                <div class="search-container" style="margin-top: 20px;">
                    <input type="text" id="input-busca"
                        placeholder="Pesquise por pedido, código ou descrição (ex: U123 MOTOR)..."
                        style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-family: 'Inter', sans-serif;">
                </div>
                <div class="botoes-container">
                    <label for="input-excel" class="btn-importar">
                        <span>📁 Selecionar CSV</span>
                        <input type="file" id="input-excel" accept=".csv" />
                    </label>

                    <button id="btn-exportar-excel" class="btn-excel-estilo">
                        📊 Exportar Excel
                    </button>

                    <button id="btn-imprimir" class="btn-imprimir-estilo">
                        🖨️ Imprimir PDF
                    </button>
                </div>
            </div>

            <div id="tabela-container" class="table-container">
            </div>


        </section>

        <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
        <script src="../js/conferencia.js"></script>
    </main>
</body>

</html>
