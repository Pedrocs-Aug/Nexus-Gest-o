<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Gestão | Painel de sites</title>

    <link rel="icon" type="image/png" href="../img/nexus_logo.png">

    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/sites.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>

<body>
    <header class="cabecalho">
        <h1>NEXUS</h1>
        <p>gestão</p>
    </header>

    <main class="container-principal">
        <nav class="sidebar">
            <a href="../index.html">
                <img src="../img/img-menus/nexus_logo.png" alt="Nexus Logo" class="logo">
            </a>
            <ul class="menu">
                <li><a href="../index.html" class="btn-nav">Início</a></li>
                <li><a href="../html/sobre.html" class="btn-nav">Sobre</a></li>
                <li><a href="#" class="btn-nav">Serviços</a></li>
                <li><a href="../html/contato.html" class="btn-nav">Contato</a></li>
            </ul>
            <footer class="rodape-sidebar">
                <p>&copy; 2026 Nexus Gestão.</p>
                <p>Todos os direitos reservados.</p>
                <p>Desenvolvido por Pedro Augusto</p>
            </footer>
        </nav>

        <section class="dashboard">
            <div class="search-container-sites" style="margin-bottom: 25px; padding: 0 10px;">
                <input type="text" id="input-busca-sites"
                    placeholder="Pesquise por site (ex: Sieg, Vianuvem, Correios)..."
                    style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-family: 'Inter', sans-serif; font-size: 1rem;">
            </div>
            <div class="cards-row">
                <a href="http://10.14.73.231/LoginAux.aspx?Windows" target="_blank" class="card">
                    <label for="dealernet" class="legend">Dealer.net</label>
                    <img src="../img/img-sites/dealernet.png" alt="dealernet">
                </a>
                <a href="https://toyota.catalog.srv.br/" target="_blank" class="card">
                    <label for="catalogo" class="legend">Toyota Catalago</label>
                    <img src="../img/img-sites/toyota-catalago.png" alt="Links">
                </a>

                <a href="https://app.holmesdoc.io/#/login" target="_blank" class="card">
                    <label for="holmes" class="legend">Holmes</label>
                    <img src="../img/img-sites/holmes.JPG" alt="Holmes">
                </a>

                <a href="https://portal.toyotalatam.com/#/home" target="_blank" class="card">
                    <label for="singleportal" class="legend">Single Portal</label>
                    <img src="../img/img-sites/SinglePortal.png" alt="Em breve">
                </a>
            </div>

            <div class="cards-row">
                <a href="https://auth.sieg.com/login" target="_blank" class="card">
                    <label for="sieg" class="legend">Sieg</label>
                    <img src="../img/img-sites/sieg.JPG" alt="sieg">
                </a>

                <a href="https://login.lg.com.br/login/ITAVEMA" target="_blank" class="card">
                    <label for="login-lg" class="legend">Login LG</label>
                    <img src="../img/img-sites/login-lg.JPG" alt="LG">
                </a>
                
                <a href="https://www2.correios.com.br/enderecador/encomendas/default.cfm" target="_blank" class="card">
                    <label for="correios" class="legend">Correios</label>
                    <img src="../img/img-sites/correios.JPG" alt="">
                </a>

                <a href="https://webmail.itavema.com.br/" target="_blank" class="card">
                    <label for="webmail" class="legend">Webmail</label>
                    <img src="../img/img-sites/web-email-itavema.png" alt="Formulários">
                </a>
            </div>

            <div class="cards-row">
                <a href="https://itoyota.lmsnext.com.br/auth/login" target="_blank" class="card">
                    <label for="cursos-toyota" class="legend">Cursos Toyota</label>
                    <img src="../img/img-sites/cursos.JPG" alt="cursos-toyota">
                </a>

                <a href="https://acampa.app/v3/login" target="_blank" class="card">
                    <label for="Atria" class="legend">Atria</label>
                    <img src="../img/img-sites/Atria.JPG" alt="Atria">
                </a>

                <a href="https://itavema.suport.cloud/login" target="_blank" class="card">
                    <label for="Mivus" class="legend">Mivus</label>
                    <img src="../img/img-sites/Mivus.JPG" alt="Mivus">
                </a>

                <a href="https://cnpja.com/" target="_blank" class="card">
                    <label for="Cnpjá" class="legend">Cnpjá</label>
                    <img src="../img/img-sites/Cnpjá.JPG" alt="Cnpjá">
                </a>
            </div>

        </section>
    </main>
</body>
<script src="../js/filtro-global.js"></script>

</html>
